
name: Run auto_extract_rf_data.py
run-name: ${{ github.actor }} is running auto_extract_rf_data.py

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4

      - name: Setup Python Version
        uses: actions/setup-python@v4
        with:
          python-version: 3.12 

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests pyyaml openpyxl plotly pandas

      - name: Execute Python script to generate publication data JSON
        run: |
          cd data_miner
          python auto_extract_rf_data.py
          python visualise_rf_stats.py
          

      - name: Add identity 
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
          
      - name: Add JSONS
        run: |  
          cd ../com_hecbiosim_impact
          git add .

      - name: Check for changes, commit if needed
        run: |     
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Updated JSON files"
          fi
